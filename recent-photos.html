<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <title>Penn Rec – Intramural Sports Carousel</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }

    h2 {
      text-align: center;
      color: #00356b;
      margin-bottom: 20px;
    }

    .carousel {
      position: relative;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      overflow: hidden;
      border-radius: 10px;
    }

    .slides {
      display: flex;
      width: 100%;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    .slides img {
      width: 100%;
      flex-shrink: 0;
      scroll-snap-align: center;
      border-radius: 10px;
      object-fit: cover;
    }

    /* Hide scrollbar */
    .slides::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>
