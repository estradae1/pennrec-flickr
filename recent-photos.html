<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Penn Rec – Recent Photos</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }
    h2 {
      text-align: center;
      color: #00356b;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }
    .gallery img {
      width: 100%;
      border-radius: 6px;
    }
  </style>
</head>

<body>
  <h2>Most Recent Photos</h2>

  <div class="gallery" id="gallery"></div>

  <script>
    // Penn Rec Flickr user ID
    const userId = "200833995@N03";

    // CORS-friendly proxy for Flickr public feed
    const url = `https://api.allorigins.win/raw?url=${encodeURIComponent(
      "https://www.flickr.com/services/feeds/photos_public.gne?id=" +
        userId +
        "&format=json&nojsoncallback=1"
    )}`;

    fetch(url)
      .then(response => response.json())
      .then(data => {
        const gallery = document.getElementById("gallery");

        data.items.forEach(item => {
          const img = document.createElement("img");
          img.src = item.media.m.replace("_m.jpg", "_b.jpg");
          img.alt = item.title;
          gallery.appendChild(img);
        });
      })
      .catch(err => console.error("Error loading Flickr images:", err));
  </script>
</body>
</html>
